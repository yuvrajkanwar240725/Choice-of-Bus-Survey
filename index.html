<!DOCTYPE html>
<html>

<head>

<title>Bus Choice Survey</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Chandigarh – Shimla Bus Travel Survey</h1>


<!-- INTRO -->

<div id="intro">

<p>
Assume you are travelling between Chandigarh and Shimla.
A new Electric Bus service may be introduced.
Please select the bus you would prefer in each scenario.
</p>

<button onclick="showSection('socio')">Start Survey</button>

</div>


<!-- SOCIO DEMOGRAPHICS -->

<div id="socio" style="display:none">

<h2>About You</h2>

<label>Age</label><br>

<select id="age">
<option value="young">18–30</option>
<option value="mid">31–50</option>
<option value="old">Above 50</option>
</select>

<br><br>

<label>Income</label><br>

<select id="income">
<option value="low">Below ₹5 Lakh</option>
<option value="mid">₹5–10 Lakh</option>
<option value="high">Above ₹10 Lakh</option>
</select>

<br><br>

<label>Travel Frequency (Chandigarh–Shimla)</label><br>

<select id="frequency">
<option value="rare">Rare</option>
<option value="regular">1–2 times/year</option>
<option value="frequent">Frequent</option>
</select>

<br><br>

<button onclick="startExperiment()">Continue</button>

</div>


<!-- CHOICE EXPERIMENT -->

<div id="choice" style="display:none">

<h2>Choose Your Preferred Bus</h2>

<div id="cards"></div>

</div>


<script src="script.js"></script>

</body>

</html>
